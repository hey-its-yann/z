<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zEzO - Preview</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Righteous&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }

        /* UPDATED: More reasonable delay (1.5s) and a smoother, slower fade-in (3s) */
        .logo-wrapper {
            position: relative;
            z-index: 5;
            opacity: 0; 
            transform: scale(0.8); /* Starts slightly smaller instead of fully shrunk */
            animation: smoothEntrance 3s ease-out 1.5s forwards;
        }

        .logo-preview {
            width: 250px;
            height: auto;
            filter: brightness(0) invert(1) drop-shadow(0 0 30px rgba(255,255,255,0.6));
            /* Waits 4.5 seconds total (1.5s delay + 3s entrance) */
            animation: floatLogo 4s ease-in-out 4.5s infinite;
        }

        /* UPDATED: A gentle, gradual fade and zoom */
        @keyframes smoothEntrance {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); filter: blur(8px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); }
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        /* --- NEW: Soundwaves Styles --- */
        .soundwaves-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2; /* Behind the logo, above the notes */
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .wave {
            position: absolute;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            opacity: 0;
            /* The animation pushes the rings outward */
            animation: ripple 6s infinite ease-out;
        }

        /* Stagger the start times so they flow continuously */
        .wave:nth-child(1) { animation-delay: 2s; }
        .wave:nth-child(2) { animation-delay: 3.5s; }
        .wave:nth-child(3) { animation-delay: 5s; }
        .wave:nth-child(4) { animation-delay: 6.5s; }

        @keyframes ripple {
            0% { width: 200px; height: 200px; opacity: 0.8; border-width: 4px; }
            100% { width: 800px; height: 800px; opacity: 0; border-width: 1px; }
        }

        /* --- Musical Notes Styles --- */
        #notes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-note {
            position: absolute;
            bottom: -50px;
            color: rgba(255, 255, 255, 0.25);
            animation: riseAndSway linear infinite;
        }

        @keyframes riseAndSway {
            0% { transform: translate(0, 0) rotate(0deg) scale(0.5); opacity: 0; }
            20% { opacity: 1; transform: translate(-30px, -20vh) rotate(45deg) scale(1.2); }
            50% { transform: translate(30px, -50vh) rotate(180deg) scale(0.8); }
            80% { opacity: 1; transform: translate(-20px, -80vh) rotate(270deg) scale(1.1); }
            100% { transform: translate(0, -120vh) rotate(360deg) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">
        <i data-lucide="arrow-left"></i> Back
    </a>

    <div id="notes-container"></div>

    <div class="soundwaves-container">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="logo-wrapper">
        <img src="logo-black.svg" alt="ZeZo Logo" class="logo-preview">
    </div>

    <script>
        lucide.createIcons();

        const container = document.getElementById('notes-container');
        const numberOfNotes = 25; 

        const notePaths = [
            '<path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>',
            '<path d="M9 18V5l12-2"></path><circle cx="6" cy="18" r="3"></circle>',
            '<circle cx="12" cy="18" r="3"></circle><path d="M15 18V6"></path>'
        ];

        for (let i = 0; i < numberOfNotes; i++) {
            const note = document.createElement('div');
            note.classList.add('floating-note');
            
            const randomPath = notePaths[Math.floor(Math.random() * notePaths.length)];
            note.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${randomPath}</svg>`;
            
            const size = Math.random() * 35 + 15; 
            note.style.width = `${size}px`;
            note.style.height = `${size}px`;
            note.style.left = `${Math.random() * 100}vw`; 
            note.style.animationDuration = `${Math.random() * 8 + 8}s`; 
            note.style.animationDelay = `${Math.random() * 10}s`; 
            
            container.appendChild(note);
        }
    </script>
</body>
</html>
