<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZeZo - Preview</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Righteous&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        :root {
            --btn-text-color: white;
            --btn-border-color: rgba(255, 255, 255, 0.2);
            --btn-bg-hover: rgba(255, 255, 255, 0.3);
            --note-color: white;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            position: relative;
            transition: background 0.8s ease;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .top-controls {
            position: absolute;
            top: 30px;
            width: 100%;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
            pointer-events: none;
        }

        .back-btn, .theme-btn {
            pointer-events: auto;
            text-decoration: none;
            color: var(--btn-text-color);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--btn-border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            cursor: pointer;
            outline: none;
        }

        .back-btn:hover, .theme-btn:hover {
            background: var(--btn-bg-hover);
            transform: translateY(-3px);
        }

        .dropdown {
            position: relative;
            display: inline-block;
            pointer-events: auto;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--btn-border-color);
            border-radius: 15px;
            overflow: hidden;
            min-width: 130px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content button {
            width: 100%;
            padding: 12px 20px;
            background: none;
            border: none;
            color: var(--btn-text-color);
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: background 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dropdown-content button:hover {
            background: var(--btn-bg-hover);
        }

        .logo-wrapper {
            position: relative;
            z-index: 5;
            opacity: 0; 
            transform: scale(0.85);
            animation: mysteriousEntrance 4.5s ease-in-out 3s forwards;
        }

        .logo-preview {
            width: 250px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.6));
            animation: floatLogo 4s ease-in-out 7.5s infinite;
            transition: opacity 0.3s ease, filter 0.5s ease;
        }

        @keyframes mysteriousEntrance {
            0% { opacity: 0; transform: scale(0.85) translateY(10px); filter: blur(20px); }
            50% { opacity: 0.5; filter: blur(8px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); }
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        #notes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-note {
            position: absolute;
            bottom: -50px;
            color: var(--note-color);
            opacity: 0.3;
            animation: riseAndSway linear infinite;
        }

        @keyframes riseAndSway {
            0% { transform: translate(0, 0) rotate(0deg) scale(0.5); opacity: 0; }
            20% { opacity: 0.3; transform: translate(-30px, -20vh) rotate(45deg) scale(1.2); }
            50% { transform: translate(30px, -50vh) rotate(180deg) scale(0.8); }
            80% { opacity: 0.3; transform: translate(-20px, -80vh) rotate(270deg) scale(1.1); }
            100% { transform: translate(0, -120vh) rotate(360deg) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="top-controls">
        <a href="index.html" class="back-btn">
            <i data-lucide="arrow-left"></i> Back
        </a>
        
        <div class="dropdown">
            <button class="theme-btn">
                <i data-lucide="palette"></i> Theme
            </button>
            <div class="dropdown-content">
                <button onclick="changeTheme('white')"><i data-lucide="sun" style="width: 16px;"></i> White</button>
                <button onclick="changeTheme('red')"><i data-lucide="flame" style="width: 16px;"></i> Red</button>
                <button onclick="changeTheme('black')"><i data-lucide="moon" style="width: 16px;"></i> Black</button>
                <button onclick="changeTheme('vibe')"><i data-lucide="sparkles" style="width: 16px;"></i> Vibe</button>
            </div>
        </div>
    </div>

    <div id="notes-container"></div>

    <div class="logo-wrapper">
        <img id="main-logo" src="logo-white.png" alt="ZeZo Logo" class="logo-preview">
    </div>

    <audio id="bg-music" src="I Get U.oga" autoplay loop></audio>

    <script>
        lucide.createIcons();

        const container = document.getElementById('notes-container');
        const numberOfNotes = 25; 

        const notePaths = [
            '<path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>',
            '<path d="M9 18V5l12-2"></path><circle cx="6" cy="18" r="3"></circle>',
            '<circle cx="12" cy="18" r="3"></circle><path d="M15 18V6"></path>'
        ];

        for (let i = 0; i < numberOfNotes; i++) {
            const note = document.createElement('div');
            note.classList.add('floating-note');
            
            const randomPath = notePaths[Math.floor(Math.random() * notePaths.length)];
            note.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${randomPath}</svg>`;
            
            const size = Math.random() * 35 + 15; 
            note.style.width = `${size}px`;
            note.style.height = `${size}px`;
            note.style.left = `${Math.random() * 90}vw`; 
            note.style.animationDuration = `${Math.random() * 8 + 8}s`; 
            note.style.animationDelay = `${Math.random() * 10}s`; 
            
            container.appendChild(note);
        }

        document.getElementById('bg-music').volume = 0.5; 

        const themes = {
            white: {
                src: 'logo-white.png',
                bg: 'linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab)',
                isLightBg: false,
                noteColor: 'white'
            },
            red: {
                src: 'logo-red.png',
                bg: 'linear-gradient(-45deg, #1c0505, #3b0a0a, #111111, #240000)',
                isLightBg: false,
                noteColor: '#ff4d4d'
            },
            black: {
                src: 'logo-black.png',
                bg: 'linear-gradient(-45deg, #f4f4f6, #ebeae5, #f0f0f0, #e8e8e4)',
                isLightBg: true,
                noteColor: '#333333'
            },
            vibe: {
                src: 'logo-pink.png',
                bg: 'linear-gradient(-45deg, #fffcdd, #fff0a8, #ffe57f, #fff9c4)',
                isLightBg: true,
                noteColor: '#ff6b8b'
            }
        };

        function changeTheme(themeName) {
            const logo = document.getElementById('main-logo');
            const root = document.documentElement;
            const selectedTheme = themes[themeName];

            logo.style.opacity = '0';
            
            setTimeout(() => {
                logo.src = selectedTheme.src;
                document.body.style.background = selectedTheme.bg;
                document.body.style.backgroundSize = '400% 400%';
                
                root.style.setProperty('--note-color', selectedTheme.noteColor);

                if (selectedTheme.isLightBg) {
                    root.style.setProperty('--btn-text-color', '#333');
                    root.style.setProperty('--btn-border-color', 'rgba(0, 0, 0, 0.2)');
                    root.style.setProperty('--btn-bg-hover', 'rgba(0, 0, 0, 0.1)');
                    logo.style.filter = 'drop-shadow(0 0 30px rgba(0,0,0,0.15))';
                } else {
                    root.style.setProperty('--btn-text-color', 'white');
                    root.style.setProperty('--btn-border-color', 'rgba(255, 255, 255, 0.2)');
                    root.style.setProperty('--btn-bg-hover', 'rgba(255, 255, 255, 0.3)');
                    
                    if(themeName === 'red') {
                        logo.style.filter = 'drop-shadow(0 0 30px rgba(255,77,77,0.4))';
                    } else {
                        logo.style.filter = 'drop-shadow(0 0 30px rgba(255,255,255,0.4))';
                    }
                }

                logo.style.opacity = '1';
            }, 300);
        }
    </script>
</body>
</html>
