<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeZo - Preview</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Righteous&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }

        /* --- THE MYSTERIOUS REVEAL --- */
        .logo-wrapper {
            position: relative;
            z-index: 5;
            opacity: 0; 
            transform: scale(0.85);
            /* Waits 3s, then takes 4.5s to slowly emerge */
            animation: mysteriousEntrance 4.5s ease-in-out 3s forwards;
        }

        .logo-preview {
            width: 250px;
            height: auto;
            filter: brightness(0) invert(1) drop-shadow(0 0 30px rgba(255,255,255,0.6));
            /* 3s delay + 4.5s entrance = 7.5s wait before floating starts */
            animation: floatLogo 4s ease-in-out 7.5s infinite;
        }

        @keyframes mysteriousEntrance {
            0% { opacity: 0; transform: scale(0.85) translateY(10px); filter: blur(20px); }
            50% { opacity: 0.5; filter: blur(8px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); }
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        /* --- NEW: LAG-FREE HORIZONTAL WAVES --- */
        .horizontal-waves {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px; /* Space between the lines */
            z-index: 2; /* Behind the logo */
            pointer-events: none;
        }

        .h-line {
            height: 2px;
            /* Fades out at the edges for a sleek look */
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            /* scaleX is highly optimized by browsers, preventing lag */
            animation: waveStretch 4s ease-in-out infinite alternate;
        }

        /* Stagger the widths and animation times for an organic feel */
        .line-1 { width: 30%; animation-delay: 0s; }
        .line-2 { width: 60%; animation-delay: -1.5s; height: 3px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent); }
        .line-3 { width: 30%; animation-delay: -3s; }

        @keyframes waveStretch {
            0% { transform: scaleX(0.7); opacity: 0.2; }
            100% { transform: scaleX(1.4); opacity: 0.9; filter: drop-shadow(0 0 10px rgba(255,255,255,0.8)); }
        }

        /* --- Musical Notes Styles --- */
        #notes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-note {
            position: absolute;
            bottom: -50px;
            color: rgba(255, 255, 255, 0.25);
            animation: riseAndSway linear infinite;
        }

        @keyframes riseAndSway {
            0% { transform: translate(0, 0) rotate(0deg) scale(0.5); opacity: 0; }
            20% { opacity: 1; transform: translate(-30px, -20vh) rotate(45deg) scale(1.2); }
            50% { transform: translate(30px, -50vh) rotate(180deg) scale(0.8); }
            80% { opacity: 1; transform: translate(-20px, -80vh) rotate(270deg) scale(1.1); }
            100% { transform: translate(0, -120vh) rotate(360deg) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">
        <i data-lucide="arrow-left"></i> Back
    </a>

    <div id="notes-container"></div>

    <div class="horizontal-waves">
        <div class="h-line line-1"></div>
        <div class="h-line line-2"></div>
        <div class="h-line line-3"></div>
    </div>

    <div class="logo-wrapper">
        <img src="logo-black.svg" alt="ZeZo Logo" class="logo-preview">
    </div>

    <script>
        lucide.createIcons();

        const container = document.getElementById('notes-container');
        const numberOfNotes = 25; 

        const notePaths = [
            '<path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>',
            '<path d="M9 18V5l12-2"></path><circle cx="6" cy="18" r="3"></circle>',
            '<circle cx="12" cy="18" r="3"></circle><path d="M15 18V6"></path>'
        ];

        for (let i = 0; i < numberOfNotes; i++) {
            const note = document.createElement('div');
            note.classList.add('floating-note');
            
            const randomPath = notePaths[Math.floor(Math.random() * notePaths.length)];
            note.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${randomPath}</svg>`;
            
            const size = Math.random() * 35 + 15; 
            note.style.width = `${size}px`;
            note.style.height = `${size}px`;
            note.style.left = `${Math.random() * 100}vw`; 
            note.style.animationDuration = `${Math.random() * 8 + 8}s`; 
            note.style.animationDelay = `${Math.random() * 10}s`; 
            
            container.appendChild(note);
        }
    </script>
</body>
</html>
