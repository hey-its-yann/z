<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeZo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Righteous&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --pride-gradient: linear-gradient(45deg, #FFB3B3, #FFD1A9, #FFF8B3, #B3FFB3, #B3E0FF, #D1B3FF);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 50px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: scale(1.02);
        }

        .brand-header h1 {
            font-family: 'Righteous', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 1px;
            margin-bottom: 30px;
            background: #fff;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: var(--pride-gradient);
            background-clip: text;
        }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .asset-link {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        /* Rainbow Hover Effect applied to all buttons */
        .asset-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: transparent;
            background: var(--pride-gradient);
            color: #000;
        }

        .asset-link span {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .svg-full {
            grid-column: span 2;
            flex-direction: row;
            justify-content: center;
        }

        i {
            stroke-width: 2.5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <header class="brand-header">
            <h1>ZeZo</h1>
        </header>

        <div class="asset-grid">
            <a href="preview.html" class="asset-link svg-full">
                <i data-lucide="play-circle"></i>
                <span>Preview</span>
            </a>

            <a href="logo-white.png" download class="asset-link">
                <i data-lucide="image"></i>
                <span>White</span>
            </a>
            
            <a href="logo-black.png" download class="asset-link">
                <i data-lucide="image-down"></i>
                <span>Black</span>
            </a>

            <a href="logo-red.png" download class="asset-link">
                <i data-lucide="palette"></i>
                <span>Red</span>
            </a>

            <a href="logo-pink.png" download class="asset-link">
                <i data-lucide="heart"></i>
                <span>Vibe</span>
            </a>
            
            <a href="logo-black.svg" download class="asset-link svg-full">
                <i data-lucide="layers"></i>
                <span>Master</span>
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
