<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZezoMusic | Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            /* Upgraded to a modern, premium pride gradient (smoother transitions) */
            --modern-pride: linear-gradient(135deg, #FF3B30, #FF9500, #FFCC00, #4CD964, #5AC8FA, #007AFF, #5856D6);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111; 
            overflow: hidden;
            position: relative; 
        }

        /* PERFORMANCE FIX: 
           Instead of animating the background, we animate a giant blurred element 
           using 'transform'. This offloads the work to the GPU and stops the lag! 
        */
        .bg-layer {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg, 
                #FF3B30, #FF9500, #FFCC00, #4CD964, #5AC8FA, #007AFF, #5856D6, #FF2D55
            );
            background-size: 200% 200%;
            z-index: 0;
            animation: smoothSpin 25s linear infinite;
            filter: blur(100px); /* Blends the colors beautifully */
            opacity: 0.85;
        }

        @keyframes smoothSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Upgraded Glassmorphism Card */
        .card {
            position: relative;
            z-index: 10; /* Keeps card above the spinning background */
            background: var(--glass-bg);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 50px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            /* Added an inner glow and a deeper drop shadow for 3D depth */
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 2px 15px rgba(255, 255, 255, 0.3);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: scale(1.02) translateY(-5px);
        }

        .brand-header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 30px;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Grid for Icons/Buttons */
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .asset-link {
            text-decoration: none;
            color: white;
            background: rgba(0, 0, 0, 0.25); /* Darker background so white text pops */
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .asset-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Rainbow Hover Effect for specific items */
        .asset-link.rainbow:hover {
            border-color: transparent;
            background: var(--modern-pride);
            color: #fff;
            box-shadow: 0 10px 30px rgba(255, 204, 0, 0.4); /* Adds a warm glow */
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .asset-link span {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .svg-full {
            grid-column: span 2;
            flex-direction: row;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1); /* Slightly lighter for the master button */
        }

        i {
            stroke-width: 2px;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="card">
        <header class="brand-header">
            <h1>ZEZO</h1>
        </header>

        <div class="asset-grid">
            <a href="logo-white.png" download class="asset-link">
                <i data-lucide="image"></i>
                <span>White PNG</span>
            </a>
            
            <a href="logo-black.png" download class="asset-link">
                <i data-lucide="image-down"></i>
                <span>Black PNG</span>
            </a>

            <a href="logo-red.png" download class="asset-link">
                <i data-lucide="palette"></i>
                <span>Red PNG</span>
            </a>

            <a href="logo-pink.png" download class="asset-link rainbow">
                <i data-lucide="heart"></i>
                <span>Vibe PNG</span>
            </a>
            
            <a href="logo-black.svg" download class="asset-link svg-full">
                <i data-lucide="layers"></i>
                <span>Download Master SVG</span>
            </a>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
