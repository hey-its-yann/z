<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZezoMusic | Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --modern-pride: linear-gradient(135deg, #FF3B30, #FF9500, #FFCC00, #4CD964, #5AC8FA, #007AFF, #5856D6);
            --glass-bg: rgba(20, 20, 25, 0.6); /* Darker glass for better contrast */
            --border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        /* ALIGNMENT FIX: Locked down the centering logic.
           Added padding so the card never touches the screen edges on small devices.
        */
        body {
            margin: 0;
            height: 100vh; /* Fixed height instead of min-height to prevent unwanted scrolling */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #09090b; /* Deep, sleek studio black */
            overflow: hidden;
            position: relative;
            padding: 20px; 
        }

        /* NEW BACKGROUND: A professional dark grid pattern.
        */
        .grid-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px; /* Size of the grid squares */
            pointer-events: none;
        }

        /* SUBTLE GLOW: A soft, slow-pulsing colorful orb perfectly centered behind the card.
        */
        .center-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(90, 200, 250, 0.15) 0%, rgba(255, 45, 85, 0.1) 40%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            filter: blur(40px);
            animation: pulseGlow 8s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* Upgraded Glassmorphism Card */
        .card {
            position: relative;
            z-index: 10; 
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-top: 1px solid rgba(255, 255, 255, 0.3); /* Highlights the top edge like real glass */
            border-radius: 32px;
            padding: 50px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: scale(1.02) translateY(-5px);
        }

        .brand-header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 30px;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .asset-link {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85); /* Slightly muted text for better contrast */
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .asset-link:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Rainbow Hover Effect */
        .asset-link.rainbow:hover {
            border-color: transparent;
            background: var(--modern-pride);
            color: #fff;
            box-shadow: 0 10px 30px rgba(255, 59, 48, 0.3);
        }

        .asset-link span {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .svg-full {
            grid-column: span 2;
            flex-direction: row;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08); 
        }

        i {
            stroke-width: 2px;
            color: inherit; /* Adopts the color of the text */
        }
    </style>
</head>
<body>

    <div class="grid-background"></div>
    <div class="center-glow"></div>

    <div class="card">
        <header class="brand-header">
            <h1>ZEZO</h1>
        </header>

        <div class="asset-grid">
            <a href="logo-white.png" download class="asset-link">
                <i data-lucide="image"></i>
                <span>White PNG</span>
            </a>
            
            <a href="logo-black.png" download class="asset-link">
                <i data-lucide="image-down"></i>
                <span>Black PNG</span>
            </a>

            <a href="logo-red.png" download class="asset-link">
                <i data-lucide="palette"></i>
                <span>Red PNG</span>
            </a>

            <a href="logo-pink.png" download class="asset-link rainbow">
                <i data-lucide="heart"></i>
                <span>Vibe PNG</span>
            </a>
            
            <a href="logo-black.svg" download class="asset-link svg-full">
                <i data-lucide="layers"></i>
                <span>Download Master SVG</span>
            </a>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
